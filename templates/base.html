<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Best cancer surgeon consultation">

    <meta name="keywords" content="cancer surgery, oncology doctor">

    <meta name="author" content="Doctor Name">

    <title>Doctor Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">


    <style>
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: 1s;
        }

        .fade-in.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">Doctor</a>

            <div>

                <a class="nav-link text-white" href="/">Home</a>
                <a class="nav-link text-white" href="/blogs/">Blogs</a>
                <a class="nav-link text-white" href="/services/">Services</a>
                <a class="btn btn-primary ms-2" href="/appointment/">Book</a>
                <a class="nav-link text-white" href="/contact/">Contact</a>
                <a class="nav-link text-white" href="/testimonials/">Testimonials</a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        {% block content %}

        {% endblock %}

    </div>


    <script>
        const counters = document.querySelectorAll('.counter');

        counters.forEach(counter => {
            counter.innerText = '0';

            const updateCounter = () => {
                const target = +counter.innerText.replace('+', '') || 100;
                const c = +counter.innerText;

                const increment = target / 100;

                if (c < target) {
                    counter.innerText = `${Math.ceil(c + increment)}`;
                    setTimeout(updateCounter, 20);
                }
            };

            updateCounter();
        });
    </script>


    <footer class="bg-dark text-white mt-5 p-4">

        <div class="container text-center">

            <h5>Dr. Manish Sharma</h5>

            <p>Expert Cancer Specialist</p>

            <div>
                <a href="#" class="text-white me-3">Facebook</a>
                <a href="#" class="text-white me-3">Instagram</a>
                <a href="#" class="text-white">LinkedIn</a>
            </div>

            <p class="mt-3">© 2026 All Rights Reserved</p>

        </div>

    </footer>

    <script>
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.fade-in').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight) {
                    el.classList.add('show');
                }
            });
        });
    </script>

    <script>

        const fadeElements = document.querySelectorAll('.fade-in');

        function showOnScroll() {

            fadeElements.forEach(el => {

                const position = el.getBoundingClientRect().top;

                if (position < window.innerHeight - 100) {
                    el.classList.add('show');
                }

            });

        }

        window.addEventListener('scroll', showOnScroll);
        window.addEventListener('load', showOnScroll);

    </script>






</body>

</html>
