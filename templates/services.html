{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Our Services</h2>

<div class="row">

{% for service in services %}

<div class="col-md-4">

<div class="card">

<img src="{{service.image.url}}" class="card-img-top">

<div class="card-body">

<h5>{{service.title}}</h5>

<p>{{service.description|truncatewords:20}}</p>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
